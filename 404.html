        /* Página independente do Bootstrap: fonte do corpo definida aqui */
        body {
            font-family: 'IBM Plex Sans', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container-404 {
            box-sizing: border-box; /* padding incluído no max-width (sem o reset do Bootstrap) */
            text-align: center;
            background-color: #fff;
            padding: 40px;
            border-top: 4px solid var(--brass); /* selo de latão da marca */
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(89, 17, 37, 0.12);
            max-width: 400px;
            width: 100%;
        }
        .logo-404 {
            width: 120px;
            height: auto;
            margin: 0 auto 24px;
            display: block;
        }
        .codigo-404 {
            font-family: var(--fonte-dados);
            color: var(--brass-ink);

            font-family: var(--fonte-titulo);
            color: var(--brand);
            font-weight: 600;
            font-size: 1.6rem;
            margin: 0 0 4px;
        }
        .texto-404 {
            color: var(--stone);
            font-size: .95rem;
            margin: 0 0 24px;
        }
        a.btn-voltar {
            display: block;
            padding: 12px 30px;
            background-color: var(--brand);
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }
        a.btn-voltar:hover {
            background-color: var(--brand-dark);
        }
        a.btn-voltar:focus-visible {
            outline: 3px solid var(--brand-dark);
            outline-offset: 2px;
        }
